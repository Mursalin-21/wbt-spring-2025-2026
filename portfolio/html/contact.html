<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact - Noor Uddin Md Mursalin</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
</head>

<body>


    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="educations.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>


    <h2>Contact Form</h2>


    <form method="post">
        <table>

            <tr>
                <th colspan="2">Contact Information</th>
            </tr>

            <tr>
                <td>First Name</td>
                <td><input type="text" name="firstname" required></td>
            </tr>

            <tr>
                <td>Last Name</td>
                <td><input type="text" name="lastname" required></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" value="Male" required> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                </td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" name="email" required></td>
            </tr>

            <tr>
                <td>Company</td>
                <td><input type="text" name="company"></td>
            </tr>

            <tr>
                <td>Reason of Contact</td>
                <td>
                    <select name="reason" required>
                        <option value="">Select</option>
                        <option value="Projects">Projects</option>
                        <option value="Thesis">Thesis</option>
                        <option value="Job">Job</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Topics</td>
                <td>
                    <input type="checkbox" name="topics[]" value="Web Development"> Web Development<br>
                    <input type="checkbox" name="topics[]" value="Mobile Development"> Mobile Development<br>
                    <input type="checkbox" name="topics[]" value="AI/ML Development"> AI/ML Development
                </td>
            </tr>

            <tr>
                <td>Consultation Date</td>
                <td><input type="date" name="date" required></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

    <br>
    <a href="../index.html">Back to Home</a>


    <footer>
        <p>&copy; 2026 Noor Uddin Md Mursalin</p>
    </footer>

</body>

</html>
